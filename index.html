<style>
  :root {
    --bg: #0a0a0c;
    --surface: #131316;
    --surface-2: #1b1b20;
    --border: #26262c;
    --text: #e8e8ea;
    --text-dim: #8b8b93;
    --text-faint: #5a5a62;
    --green: #2ecc71;
    --green-dim: #1d7a47;
    --red: #e05252;
    --amber: #e0a53c;
    --cyan: #54b8c7;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 80px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 0 20px;
  }
  header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
  header h1 span { color: var(--text-faint); font-weight: 400; }
  .ver-mark {
    display: inline-block;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--green) !important;
    border: 1px solid var(--green-dim);
    border-radius: 999px;
    padding: 1px 7px;
    vertical-align: 2px;
  }
  .day-left { font-size: 0.72rem; color: var(--text-faint); margin-top: 2px; }
  .day-left.urgent { color: var(--red); }
  .header-right { display: flex; align-items: center; gap: 10px; }

  /* Progress ring */
  .ring-box { display: flex; align-items: center; gap: 10px; }
  .ring { width: 48px; height: 48px; }
  .ring circle { fill: none; stroke-width: 4; }
  .ring .track { stroke: var(--surface-2); }
  .ring .bar {
    stroke: var(--green);
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 0.4s ease;
  }
  .ring text {
    fill: var(--text);
    font-size: 11px;
    font-weight: 700;
    text-anchor: middle;
    dominant-baseline: central;
  }
  .ring-label { font-size: 0.72rem; color: var(--text-dim); line-height: 1.3; }

  /* ---------- Buttons ---------- */
  button {
    font: inherit;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.85rem;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  button:hover { background: var(--surface-2); }
  button.danger { color: var(--red); border-color: #3a2424; }
  button.danger:hover { background: #241616; }
  button.icon-btn { padding: 8px 10px; }

  /* ---------- Toolbar ---------- */
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .toolbar input[type="search"] {
    flex: 1 1 180px;
    min-width: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 12px;
    font: inherit;
    font-size: 0.85rem;
    outline: none;
  }
  .toolbar input[type="search"]:focus { border-color: var(--text-faint); }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
  .chip {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    border-radius: 999px;
    padding: 5px 13px;
    font-size: 0.78rem;
  }
  .chip.active { color: var(--bg); font-weight: 600; }
  .chip.active.neutral { background: var(--text); border-color: var(--text); }
  .chip-toggle { color: var(--green); border-color: var(--green-dim); font-weight: 600; }
  .chip-toggle:hover { background: var(--surface-2); }

  /* ---------- Spotlight ---------- */
  .spotlight {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--green);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 22px;
  }
  .spotlight .kicker {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 8px;
  }
  .spotlight h2 { font-size: 1.15rem; margin: 4px 0 8px; letter-spacing: -0.01em; }
  .spotlight .std { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 12px; }
  .spotlight .spot-actions { display: flex; gap: 8px; align-items: center; }

  /* ---------- Book tag ---------- */
  .book-tag {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 9px;
    border-radius: 999px;
    color: var(--bg);
  }

  /* ---------- Grid & cards ---------- */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  @media (min-width: 560px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 880px) { .grid { grid-template-columns: repeat(3, 1fr); } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    border-left-width: 4px;
  }
  .card:hover { background: var(--surface-2); }
  .card.done { opacity: 0.55; }
  .card.done .card-title { text-decoration: line-through; text-decoration-color: var(--text-faint); }
  .card.flash { animation: flash 1.6s ease; }
  @keyframes flash {
    0%, 60% { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }
    100% { box-shadow: none; }
  }
  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .card-top-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .card .book-tag { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rule-n { font-size: 0.72rem; color: var(--text-faint); font-weight: 600; white-space: nowrap; }
  .card-title { font-size: 0.95rem; font-weight: 600; letter-spacing: -0.01em; }

  .tick {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border-radius: 999px;
    border: 1.5px solid var(--text-faint);
    background: transparent;
    color: transparent;
    font-size: 0.95rem;
    line-height: 1;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tick:hover { border-color: var(--green); background: transparent; }
  .tick.on { background: var(--green); border-color: var(--green); color: var(--bg); }

  .card-body { display: none; margin-top: 12px; font-size: 0.84rem; }
  .card.open .card-body { display: block; }
  .card-body h4 {
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 12px 0 5px;
  }
  .card-body h4:first-child { margin-top: 0; }
  .card-body h4.gain-h { color: var(--green); }
  .card-body h4.lose-h { color: var(--red); }
  .card-body h4.reality-h { color: var(--amber); }
  .card-body h4.choice-h { color: var(--cyan); }
  .card-body ul { list-style: none; }
  .card-body li {
    color: var(--text-dim);
    padding-left: 14px;
    position: relative;
    margin-bottom: 3px;
  }
  .card-body li::before { content: "–"; position: absolute; left: 0; color: var(--text-faint); }
  .card-body .para { color: var(--text-dim); }
  .card-body .standard-text {
    color: var(--text);
    font-weight: 500;
    background: var(--surface-2);
    border-radius: 8px;
    padding: 9px 11px;
  }

  /* ---------- Empty / drop zone ---------- */
  .empty {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 20px;
    text-align: center;
    color: var(--text-dim);
    margin-top: 10px;
  }
  .empty strong { color: var(--text); display: block; font-size: 1.05rem; margin-bottom: 6px; }
  .empty p { font-size: 0.85rem; margin-bottom: 16px; }

  .drop-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 12, 0.92);
    border: 3px dashed var(--green);
    border-radius: 16px;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--green);
    pointer-events: none;
  }
  body.dragging .drop-overlay { display: flex; }

  /* ---------- Modal (library) ---------- */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 520px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px;
  }
  @media (min-width: 560px) {
    .modal-backdrop.show { align-items: center; }
    .modal { border-radius: 16px; }
  }
  .modal h3 { font-size: 1.05rem; margin-bottom: 14px; }
  .book-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .book-row:last-of-type { border-bottom: none; }
  .book-row-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .book-dot { width: 12px; height: 12px; border-radius: 999px; flex-shrink: 0; }
  .book-row-name { font-size: 0.9rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .book-row-meta { font-size: 0.72rem; color: var(--text-faint); }
  .modal-footer { margin-top: 16px; display: flex; gap: 8px; justify-content: flex-end; }
  .modal h3.sync-title { margin: 22px 0 4px; }
  .sync-note { font-size: 0.78rem; color: var(--text-dim); margin: 6px 0 10px; }
  .sync-note a { color: var(--green); }
  .sync-err { color: var(--red); }
  .sync-row { display: flex; gap: 8px; }
  .gbtn {
    display: inline-flex;
    align-items: center;
    background: #fff;
    color: #1f1f1f;
    border: none;
    font-weight: 600;
    padding: 9px 16px;
  }
  .gbtn:hover { background: #f1f1f1; }
  .gbtn .gmark {
    font-weight: 700;
    font-size: 1rem;
    background: conic-gradient(from -45deg, #ea4335 0 25%, #fbbc05 0 50%, #34a853 0 75%, #4285f4 0);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .sync-row input {
    flex: 1;
    min-width: 0;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 12px;
    font: inherit;
    font-size: 0.85rem;
    outline: none;
  }

  /* ---------- Toast ---------- */
  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 0.85rem;
    z-index: 200;
    transition: transform 0.25s ease;
    max-width: 90vw;
    text-align: center;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .section-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 4px 0 10px;
  }
  .count-note { font-size: 0.78rem; color: var(--text-faint); margin: 14px 0 0; text-align: center; }

  /* ---------- Book section headers in grid ---------- */
  .section-header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid;
    border-radius: var(--radius);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .section-header:hover { background: var(--surface-2); }
  .section-header.sec-open { background: var(--surface-2); }
  .section-header .book-tag { max-width: 55%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .section-count { font-size: 0.74rem; color: var(--text-dim); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .sec-bar {
    flex: 1;
    min-width: 36px;
    height: 4px;
    border-radius: 999px;
    background: var(--surface-2);
    overflow: hidden;
  }
  .sec-bar-fill { display: block; height: 100%; border-radius: 999px; transition: width 0.3s ease; }
  .collapse-arrow { padding: 2px 8px; font-size: 0.8rem; border: none; background: transparent; color: var(--text-faint); flex-shrink: 0; }
  .collapse-arrow:hover { background: transparent; color: var(--text); }

  /* ---------- Rename in library ---------- */
  .rename-btn { padding: 2px 6px; font-size: 0.8rem; border: none; background: transparent; color: var(--text-faint); vertical-align: middle; margin-left: 2px; }
  .rename-btn:hover { background: transparent; color: var(--text); }
  .book-name-text { cursor: default; }

  /* ---------- Rename modal ---------- */
  .rename-modal { max-width: 400px; border-radius: 16px; }
  @media (max-width: 559px) { .rename-modal { border-radius: 16px 16px 0 0; } }
  .rename-field {
    width: 100%;

  .primary-btn:hover { background: var(--green-dim); border-color: var(--green-dim); }
</style>
</head>

    <div class="modal-footer">

    </div>
  </div>
</div>

<input type="file" id="file-input" accept="application/pdf,.pdf" multiple hidden>
<div id="toast"></div>

<script>
'use strict';

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ================= Storage ================= */

const APP_VERSION = 'v13 · 2026-07-02 (light sync)';
const STORE_KEY = 'mastery_data';

const PALETTE = [
  '#1D9E75', '#4F8EF7', '#E0A53C', '#C75FC1',
  '#E06552', '#54B8C7', '#8E7CF0', '#9CB23E',
  '#E0708F', '#5FA8E0'
];

// Distinct color for any book index — no cap on how many books you can add.
// Past the hand-picked palette, spread hues by the golden angle so even
// hundreds of books stay visually distinguishable.
function bookColor(index) {
  if (index < PALETTE.length) return PALETTE[index];
  const hue = Math.round((index * 137.508) % 360);
  return `hsl(${hue}, 55%, 56%)`;
}

// Stored compressed (LZString UTF-16) with a 1-char marker, so ~70+ books fit
// inside the browser's ~5 MB localStorage. Legacy uncompressed JSON still loads.
const STORE_MARK = ''; // prefix byte marking a compressed payload (never appears in JSON)

// Storage is SPLIT into two localStorage keys so day-to-day ticking is instant:
//   BOOKS_KEY  — the heavy book library, compressed (LZString). Only rewritten
//                when books actually change (import / remove), which is rare.
//   TICKS_KEY  — the tiny daily-tick data, plain JSON. Rewritten on every tap,
//                but it's a few KB so it's effectively free.
const BOOKS_KEY = 'mastery_books';
const TICKS_KEY = 'mastery_ticks';

function load() {
  try {
    // New split format
    const rawBooks = localStorage.getItem(BOOKS_KEY);
    if (rawBooks != null) {
      const bp = JSON.parse(LZString.decompressFromUTF16(rawBooks)) || {};
      const tp = JSON.parse(localStorage.getItem(TICKS_KEY) || '{}') || {};
      const d = Object.assign({}, tp, { books: bp.books || [], deletedBooks: bp.deletedBooks || {} });
      if (Array.isArray(d.books)) return d;
    }
    // Legacy single-blob format (compressed or plain) — migrated on next save
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const json = (raw[0] === STORE_MARK) ? LZString.decompressFromUTF16(raw.slice(1)) : raw;
      const d = JSON.parse(json);
      if (d && Array.isArray(d.books)) return d;
    }
  } catch (e) { /* corrupted store — start fresh */ }
  return { books: [] };
}

let data = load();

// Everything in `data` except the books is tick/meta data — small & cheap to write.
function ticksSlice() {
  const o = {};
  for (const k of Object.keys(data)) {
    if (k === 'books' || k === 'deletedBooks') continue;
    o[k] = data[k];
  }
  return o;
}

function writeTicks() {
  try { localStorage.setItem(TICKS_KEY, JSON.stringify(ticksSlice())); return true; }
  catch (e) { return false; }
}

function writeBooks() {
  try {
    localStorage.setItem(BOOKS_KEY, LZString.compressToUTF16(
      JSON.stringify({ books: data.books, deletedBooks: data.deletedBooks || {} })));
    localStorage.removeItem(STORE_KEY); // drop the old single blob once migrated
    return true;
  } catch (e) { return false; }
}

// Write both halves at once (used by the sync merge).
function writeLocal() {
  const a = writeBooks(), b = writeTicks();
  if (a) booksDirty = false; // books just persisted → don't recompress on next tick
  return a && b;
}

// Ticks persist immediately (cheap). The heavy book compression is debounced and
// only runs when books changed (booksDirty, set by invalidateRules()).
let persistTimer = null, booksDirty = true; // start dirty so first save migrates to split format

function save() {
  data.updatedAt = Date.now();
  if (!writeTicks()) {
    toast('⚠ Phone storage is full — couldn\'t save. Remove some books to free space.');
  }
  if (booksDirty) {
    clearTimeout(persistTimer);
    persistTimer = setTimeout(flushSave, 700);
  }
  scheduleSync();
}

function flushSave() {
  clearTimeout(persistTimer);
  writeTicks();
  if (booksDirty) {
    booksDirty = false;
    if (!writeBooks()) {
      toast('⚠ Phone storage is full — couldn\'t save. Remove some books to free space.');
    }
  }
}

function uuid() {
  return (crypto.randomUUID) ? crypto.randomUUID()
    : 'b-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 9);
}

function dateKey(d) {
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${d.getFullYear()}-${m}-${day}`;
}

function todayKey() { return dateKey(new Date()); }

const HISTORY_DAYS = 60; // how long tick history is kept (drives the smart spotlight)

let currentDay = todayKey();

function ticksKey() { return 'ticks_' + currentDay; }
function getTicks() { return data[ticksKey()] || []; }
function setTicks(arr) {
  data[ticksKey()] = arr;
  _doneSet = null; // tick set changed → rebuild lookup on next use
  data.tickStamp = { [currentDay]: Date.now() }; // per-day timestamp drives sync conflict resolution
  // keep history (for the smart spotlight), but prune anything older than HISTORY_DAYS
  const cutoff = dateKey(new Date(Date.now() - HISTORY_DAYS * 86400000));
  for (const k of Object.keys(data)) {
    if (k.startsWith('ticks_') && k.slice(6) < cutoff) delete data[k];
  }
  save();
}

/* ================= Derived state ================= */

// Flat ordered list of every rule across every book.
// Cached because it's read many times per render; invalidated on book changes.
let _allRulesCache = null, _ruleByUid = null;
function invalidateRules() { _allRulesCache = null; _ruleByUid = null; booksDirty = true; } // books changed → rewrite compressed blob

// Local book edits (import/remove/rename) also need a full cloud push; ticks
// alone go up as a tiny merge write instead of recompressing the whole library.
let cloudBooksDirty = false;
function booksChanged() { invalidateRules(); cloudBooksDirty = true; }
function allRules() {
  if (_allRulesCache) return _allRulesCache;
  const out = [];
  for (const book of data.books) {
    for (const rule of book.rules) {
      out.push({ book, rule, uid: book.id + ':' + rule.n });
    }
  }
  _allRulesCache = out;
  return out;
}
function ruleByUid(uid) {
  if (!_ruleByUid) _ruleByUid = new Map(allRules().map(r => [r.uid, r]));
  return _ruleByUid.get(uid);
}

// Today's ticks as a Set for O(1) lookups (the array scan was O(n) per card,
// O(n²) across a big grid). Invalidated whenever ticks change.
let _doneSet = null;
function doneSet() { return _doneSet || (_doneSet = new Set(getTicks())); }
function isDone(uid) { return doneSet().has(uid); }

// ticks that still point at an existing rule (stale ids can appear after a book is re-imported on another device)
function validTicks() {
  const uids = new Set(allRules().map(r => r.uid));
  return getTicks().filter(u => uids.has(u));
}

const NEVER_TICKED = 9999;
const SPOT_OVERRIDE_KEY = 'mastery_spot_override'; // local-only, not synced

function getSpotOverride() {
  try {
    const o = JSON.parse(localStorage.getItem(SPOT_OVERRIDE_KEY));
    return (o && o.day === currentDay) ? o : null;
  } catch (e) { return null; }
}

function shuffleSpotlight() {
  const all = allRules();
  if (all.length < 2) return;
  const cur = spotlightRule();
  let pick;
  do { pick = all[Math.floor(Math.random() * all.length)]; } while (cur && pick.uid === cur.uid);
  localStorage.setItem(SPOT_OVERRIDE_KEY, JSON.stringify({ day: currentDay, uid: pick.uid }));
  renderSpotlight();
}

function smartSpotlight() {
  localStorage.removeItem(SPOT_OVERRIDE_KEY);
  renderSpotlight();
}

// Smart spotlight: surface the rule that has gone unticked the longest.
// Selection only looks at history before today, so it stays stable all day
// and is identical on every synced device. Ties rotate by date.
function spotlightRule() {
  const all = allRules();
  if (!all.length) return null;
  const dayN = Math.floor(Date.parse(currentDay + 'T00:00:00') / 86400000);

  const lastTicked = {}; // uid -> day number of most recent past tick
  for (const k of Object.keys(data)) {
    if (!k.startsWith('ticks_')) continue;
    const day = k.slice(6);
    if (day >= currentDay) continue;
    const dn = Math.floor(Date.parse(day + 'T00:00:00') / 86400000);
    for (const uid of data[k] || []) {
      if (!(uid in lastTicked) || dn > lastTicked[uid]) lastTicked[uid] = dn;
    }
  }

  const o = getSpotOverride();
  if (o) {
    const hit = all.find(r => r.uid === o.uid);
    if (hit) return { ...hit, score: -1, random: true };
  }

  let best = [], bestScore = -1;
  for (const r of all) {
    const score = (r.uid in lastTicked) ? Math.min(dayN - lastTicked[r.uid], NEVER_TICKED) : NEVER_TICKED;
    if (score > bestScore) { bestScore = score; best = [r]; }
    else if (score === bestScore) best.push(r);
  }
  const pick = best[dayN % best.length];
  return { ...pick, score: bestScore };
}

/* ================= UI state ================= */

let filter = 'all';        // 'all' | 'todo' | 'done' | book id
let searchTerm = '';
const expanded = new Set();
// Book sections start MINIMIZED: only books you open render their cards, which
// keeps the grid fast with 70+ books. Open set persists per device.
let openBooks = new Set();
try { openBooks = new Set(JSON.parse(localStorage.getItem('mastery_open_books') || '[]')); } catch (e) { /* ignore */ }
function saveOpenBooks() {
  try { localStorage.setItem('mastery_open_books', JSON.stringify([...openBooks])); } catch (e) { /* ignore */ }
}

/* ================= Rendering ================= */

const $ = (id) => document.getElementById(id);

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function bookTag(book) {
  return `<span class="book-tag" style="background:${book.color}">${esc(book.name)}</span>`;
}

function renderProgress() {
  const total = allRules().length;
  const done = validTicks().length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const r = 20, circ = 2 * Math.PI * r;
  const bar = $('ring-bar');
  bar.style.strokeDasharray = circ;
  bar.style.strokeDashoffset = total ? circ * (1 - done / total) : circ;
  $('ring-text').textContent = pct + '%';
  $('ring-label').innerHTML = `${done} / ${total}<br>done today`;
}

let spotUid = null;
function renderSpotlight() {
  const spot = spotlightRule();
  const box = $('spotlight-box');
  spotUid = spot ? spot.uid : null;
  if (!spot) { box.innerHTML = ''; return; }
  const done = isDone(spot.uid);
  const why = spot.random ? 'random pick'
    : spot.score >= NEVER_TICKED ? 'never ticked yet'
    : spot.score === 1 ? 'last done yesterday'
    : `not done in ${spot.score} days`;
  box.innerHTML = `
    <div class="spotlight" style="border-left-color:${spot.book.color}">
      <div class="kicker">★ Today's Spotlight · ${why}</div>
      ${bookTag(spot.book)}
      <h2>Rule ${spot.rule.n} — ${esc(spot.rule.title)}</h2>
      <div class="std">${esc(spot.rule.standard)}</div>
      <div class="spot-actions">
        <button id="spot-jump">Jump to rule ↓</button>
        <button id="spot-shuffle" title="Show a random rule instead">🎲</button>
        ${spot.random ? '<button id="spot-smart" title="Back to the rule picked for you">★ Smart pick</button>' : ''}
        <button class="tick ${done ? 'on' : ''}" id="spot-tick" title="Mark done">✓</button>
      </div>
    </div>`;
  $('spot-jump').onclick = () => jumpTo(spot.uid);
  $('spot-shuffle').onclick = shuffleSpotlight;
  if (spot.random) $('spot-smart').onclick = smartSpotlight;
  $('spot-tick').onclick = () => toggleTick(spot.uid);
}

let chipsCollapsed = false;
try { chipsCollapsed = localStorage.getItem('mastery_chips_collapsed') === '1'; } catch (e) { /* ignore */ }

function chipHtml(c) {
  const active = filter === c.id;
  const style = (active && c.color)
    ? `style="background:${c.color};border-color:${c.color}"` : '';
  return `<button class="chip ${active ? 'active' : ''} ${c.color ? '' : 'neutral'}"
    data-filter="${c.id}" ${style}>${esc(c.label)}</button>`;
}

function renderChips() {
  const base = [
    { id: 'all', label: 'All' },
    { id: 'todo', label: 'To Do' },
    { id: 'done', label: 'Done' }
  ];
  const books = data.books.map(b => ({ id: b.id, label: b.name, color: b.color }));

  let parts = base.map(chipHtml);
  if (books.length) {
    if (chipsCollapsed) {
      // keep the active book visible so you can see what's filtered, plus an expander
      const activeBook = books.find(b => b.id === filter);
      if (activeBook) parts.push(chipHtml(activeBook));
      parts.push(`<button class="chip chip-toggle" data-toggle-chips="1">▾ ${books.length} books</button>`);
    } else {
      parts = parts.concat(books.map(chipHtml));
      parts.push(`<button class="chip chip-toggle" data-toggle-chips="1">▴ Hide books</button>`);
    }
  }
  $('chips').innerHTML = parts.join('');

  for (const el of $('chips').querySelectorAll('.chip[data-filter]')) {
    el.onclick = () => { filter = el.dataset.filter; renderAll(); };
  }
  const tog = $('chips').querySelector('[data-toggle-chips]');
  if (tog) tog.onclick = () => {
    chipsCollapsed = !chipsCollapsed;
    try { localStorage.setItem('mastery_chips_collapsed', chipsCollapsed ? '1' : '0'); } catch (e) { /* ignore */ }
    renderChips();
  };
}

// Optional shuffled card order — per device, persists until "Order" is pressed
const MIX_KEY = 'mastery_mix_order';
let mixOrder = null;
try { mixOrder = JSON.parse(localStorage.getItem(MIX_KEY)); } catch (e) { /* ignore */ }

function applyMix(rules) {
  if (!Array.isArray(mixOrder)) return rules;
  const pos = new Map(mixOrder.map((uid, i) => [uid, i]));
  // rules not in the stored order (e.g. newly imported) keep their place at the end
  return [...rules].sort((a, b) =>
    (pos.has(a.uid) ? pos.get(a.uid) : Infinity) - (pos.has(b.uid) ? pos.get(b.uid) : Infinity));
}

function updateMixButtons() {
  const mixed = Array.isArray(mixOrder);
  $('btn-order').hidden = !mixed;
  $('btn-mix').textContent = mixed ? '🔀 Re-mix' : '🔀 Mix';
}

function mixCards() {
  const uids = allRules().map(r => r.uid);
  for (let i = uids.length - 1; i > 0; i--) {   // Fisher–Yates
    const j = Math.floor(Math.random() * (i + 1));
    [uids[i], uids[j]] = [uids[j], uids[i]];
  }
  mixOrder = uids;
  localStorage.setItem(MIX_KEY, JSON.stringify(mixOrder));
  updateMixButtons();
  renderGrid();
  toast('Cards mixed — press "1→50 Order" to restore');
}

function orderCards() {
  mixOrder = null;
  localStorage.removeItem(MIX_KEY);
  updateMixButtons();
  renderGrid();
}

function visibleRules() {
  const term = searchTerm.trim().toLowerCase();
  return applyMix(allRules()).filter(({ book, rule, uid }) => {
    if (filter === 'todo' && isDone(uid)) return false;
    if (filter === 'done' && !isDone(uid)) return false;
    if (filter !== 'all' && filter !== 'todo' && filter !== 'done' && book.id !== filter) return false;
    if (term) {
      const hay = (rule.title + ' ' + rule.standard).toLowerCase();
      if (!hay.includes(term)) return false;
    }
    return true;
  });
}

function bodyHtml(rule) {
  return `
      ${rule.gain.length ? `<h4 class="gain-h">What you gain</h4>
        <ul>${rule.gain.map(g => `<li>${esc(g)}</li>`).join('')}</ul>` : ''}
      ${rule.lose.length ? `<h4 class="lose-h">What you lose if you ignore this</h4>
        <ul>${rule.lose.map(l => `<li>${esc(l)}</li>`).join('')}</ul>` : ''}
      ${rule.reality ? `<h4 class="reality-h">Reality Check</h4>
        <p class="para">${esc(rule.reality)}</p>` : ''}
      ${rule.choice ? `<h4 class="choice-h">The Choice</h4>
        <p class="para">${esc(rule.choice)}</p>` : ''}
      ${rule.standard ? `<h4>The Standard</h4>
        <div class="standard-text">${esc(rule.standard)}</div>` : ''}`;
}

// The heavy detail body is built lazily — only for cards that are open.
// Collapsed cards are ~6 DOM nodes instead of ~25, which is what keeps a
// 3,500-rule grid scrollable on a phone.
function cardHtml(book, rule, uid) {
  const done = isDone(uid);
  const open = expanded.has(uid);
  return `
  <div class="card ${done ? 'done' : ''} ${open ? 'open' : ''}"
       id="card-${cssId(uid)}" data-uid="${uid}" style="border-left-color:${book.color}">
    <div class="card-top">
      <div class="card-top-left">
        ${bookTag(book)}
        <span class="rule-n">RULE ${rule.n}</span>
      </div>
      <button class="tick ${done ? 'on' : ''}" data-tick="${uid}" title="Mark done">✓</button>
    </div>
    <div class="card-title">${esc(rule.title)}</div>
    <div class="card-body">${open ? bodyHtml(rule) : ''}</div>
  </div>`;
}

function renderGrid() {
  const rules = visibleRules();
  const total = allRules().length;

  if (!total) {
    $('grid').innerHTML = '';
    $('empty-box').innerHTML = `
      <div class="empty">
        <strong>Your library is empty</strong>
        <p>Drop a rules PDF anywhere on this page, or pick a file to import your first book.</p>
        <button onclick="document.getElementById('file-input').click()">＋ Import a PDF</button>
      </div>`;
    $('count-note').textContent = '';
    return;
  }

  $('empty-box').innerHTML = '';

  // Sections show unless mixing or searching (search shows flat matches so
  // results are never hidden inside a minimized book).
  const searching = !!searchTerm.trim();
  const showSections = !mixOrder && !searching;

  let html = '';
  if (showSections) {
    const byBook = new Map();
    for (const r of rules) {
      if (!byBook.has(r.book.id)) byBook.set(r.book.id, { book: r.book, items: [] });
      byBook.get(r.book.id).items.push(r);
    }
    const ds = doneSet();
    for (const { book, items } of byBook.values()) {
      // filtering to one book auto-opens it — tapping its chip means "show it"
      const isOpen = openBooks.has(book.id) || filter === book.id;
      const done = items.reduce((n, r) => n + (ds.has(r.uid) ? 1 : 0), 0);
      const pct = items.length ? Math.round(done / items.length * 100) : 0;
      html += `<div class="section-header ${isOpen ? 'sec-open' : ''}" data-collapse="${book.id}" style="border-left-color:${book.color}">
        <span class="book-tag" style="background:${book.color}">${esc(book.name)}</span>
        <span class="section-count">${done ? `${done}/${items.length}` : items.length}${done === items.length && done ? ' ✓' : ''}</span>
        <span class="sec-bar"><span class="sec-bar-fill" style="width:${pct}%;background:${book.color}"></span></span>
        <button class="collapse-arrow">${isOpen ? '▲' : '▼'}</button>
      </div>`;
      if (isOpen) {
        for (const { book: b, rule, uid } of items) html += cardHtml(b, rule, uid);
      }
    }
  } else {
    html = rules.map(({ book, rule, uid }) => cardHtml(book, rule, uid)).join('');
  }

  $('grid').innerHTML = html;

  const base = rules.length === total
    ? `${total} rules · ${data.books.length} book${data.books.length === 1 ? '' : 's'}`
    : `Showing ${rules.length} of ${total} rules`;
  $('count-note').textContent = base + ' · ' + APP_VERSION;
}

// One delegated listener for the whole grid — attaching thousands of
// per-card handlers on every render was a big part of the lag.
$('grid').addEventListener('click', (e) => {
  const tickBtn = e.target.closest('[data-tick]');
  if (tickBtn) { toggleTick(tickBtn.dataset.tick); return; }

  const hdr = e.target.closest('.section-header');
  if (hdr) {
    const id = hdr.dataset.collapse;
    openBooks.has(id) ? openBooks.delete(id) : openBooks.add(id);
    saveOpenBooks();
    renderGrid();
    return;
  }

  const card = e.target.closest('.card');
  if (card) {
    const uid = card.dataset.uid;
    const body = card.querySelector('.card-body');
    if (expanded.has(uid)) {
      expanded.delete(uid);
      card.classList.remove('open');
    } else {
      expanded.add(uid);
      if (body && !body.firstChild) {        // build the detail body on first open
        const hit = ruleByUid(uid);
        if (hit) body.innerHTML = bodyHtml(hit.rule);
      }
      card.classList.add('open');
    }
  }
});

function cssId(uid) { return uid.replace(/[^a-zA-Z0-9_-]/g, '_'); }

function renderLibrary() {
  const list = $('book-list');
  const title = $('library-title');
  const nBooks = data.books.length;
  const nRules = allRules().length;
  if (title) {
    title.textContent = nBooks
      ? `📚 Library · ${nBooks} book${nBooks === 1 ? '' : 's'} · ${nRules} rule${nRules === 1 ? '' : 's'}`
      : '📚 Library';
  }
  const removeRow = $('remove-all-row');
  if (removeRow) removeRow.hidden = !nBooks;
  if (!nBooks) {
    list.innerHTML = `<p style="color:var(--text-dim);font-size:0.85rem">No books imported yet.</p>`;
    return;
  }
  list.innerHTML = data.books.map(b => `
    <div class="book-row">
      <div class="book-row-left">
        <span class="book-dot" style="background:${b.color}"></span>
        <div>
          <div class="book-row-name">
            <span class="book-name-text" data-id="${b.id}">${esc(b.name)}</span><button class="rename-btn" data-rename="${b.id}" title="Rename">✏</button>
          </div>
          <div class="book-row-meta">${b.rules.length} rules · imported ${esc(b.importedAt)}</div>
        </div>
      </div>
      <button class="danger" data-remove="${b.id}">Remove</button>
    </div>`).join('');
  for (const btn of list.querySelectorAll('[data-remove]')) {

let renameId = null;

function startRename(id) {
  const book = data.books.find(b => b.id === id);
  if (!book) return;
  renameId = id;
  $('rename-input').value = book.name;
  $('rename-modal').classList.add('show');
  setTimeout(() => { const i = $('rename-input'); i.focus(); i.select(); }, 60);
}

function commitRename() {
  const book = data.books.find(b => b.id === renameId);
  $('rename-modal').classList.remove('show');
  if (!book) return;
  const v = $('rename-input').value.trim();
  if (!v || v === book.name) return;
  book.name = v;
  booksChanged(); // without this the new name never reached the persisted books blob
  save();
  renderAll();
  toast(`Renamed to "${v}"`);
}

function cancelRename() { $('rename-modal').classList.remove('show'); }

function renderCountdown() {
  const now = new Date();
  const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  const mins = Math.max(0, Math.floor((midnight - now) / 60000));
  const h = Math.floor(mins / 60), m = mins % 60;
  const el = $('countdown');
  const undone = allRules().length - validTicks().length;
  el.textContent = (h ? `${h}h ${m}m` : `${m}m`) + ' left today' +
    (undone > 0 ? ` · ${undone} to go` : ' · all done 🎉');
  el.classList.toggle('urgent', h < 2 && undone > 0);
}

function renderAll() {
  checkDayRollover();
  $('date-label').textContent = '· ' + currentDay;
  renderCountdown();
  renderProgress();
  renderSpotlight();
  renderChips();
  renderGrid();
  renderLibrary();
  renderSyncUI();
}

/* ================= Actions ================= */

function toggleTick(uid) {
  const ticks = getTicks();
  const i = ticks.indexOf(uid);
  if (i >= 0) ticks.splice(i, 1); else ticks.push(uid);
  setTicks(ticks);

  // Surgical update instead of re-rendering all cards (huge win with many books).
  const done = isDone(uid);
  const card = $('card-' + cssId(uid));
  if (card) {
    card.classList.toggle('done', done);
    const tb = card.querySelector('[data-tick]');
    if (tb) tb.classList.toggle('on', done);
  }
  const st = $('spot-tick');
  if (st && spotUid === uid) st.classList.toggle('on', done);

  renderProgress();
  renderCountdown();
  // Only the To Do / Done filters change membership on a tick → need a grid rebuild there.
  if (filter === 'todo' || filter === 'done') renderGrid();
  else updateSectionHeader(uid.slice(0, uid.lastIndexOf(':')));
}

// Keep the book header's count + progress bar in step with ticks without a grid rebuild.
function updateSectionHeader(bookId) {
  const hdr = document.querySelector(`.section-header[data-collapse="${bookId}"]`);
  if (!hdr) return;
  const book = data.books.find(b => b.id === bookId);
  if (!book) return;
  const ds = doneSet();
  const total = book.rules.length;
  const done = book.rules.reduce((n, r) => n + (ds.has(bookId + ':' + r.n) ? 1 : 0), 0);
  const cnt = hdr.querySelector('.section-count');
  if (cnt) cnt.textContent = (done ? `${done}/${total}` : String(total)) + (done === total && done ? ' ✓' : '');
  const fill = hdr.querySelector('.sec-bar-fill');
  if (fill) fill.style.width = (total ? Math.round(done / total * 100) : 0) + '%';
}

function jumpTo(uid) {
  const bookId = uid.slice(0, uid.lastIndexOf(':'));
  if (!openBooks.has(bookId)) { openBooks.add(bookId); saveOpenBooks(); }
  expanded.add(uid);
  renderGrid();
  const el = $('card-' + cssId(uid));
  if (!el) { toast('Rule is hidden by the current filter'); return; }
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

function randomRule() {
  const undone = allRules().filter(r => !isDone(r.uid));
  if (!undone.length) { toast(allRules().length ? 'Everything is done today 🎉' : 'Library is empty'); return; }
  const pick = undone[Math.floor(Math.random() * undone.length)];
  // make sure it's visible
  if (filter === 'done' || (filter !== 'all' && filter !== 'todo' && filter !== pick.book.id)) {
    filter = 'all';
  }
  searchTerm = '';
  $('search').value = '';
  renderAll();
  jumpTo(pick.uid);
}

function removeBook(id) {
  const book = data.books.find(b => b.id === id);
  if (!book) return;
  if (!confirm(`Remove "${book.name}" and its ${book.rules.length} rules?`)) return;
  data.books = data.books.filter(b => b.id !== id);
  booksChanged();
  if (!data.deletedBooks) data.deletedBooks = {};
  data.deletedBooks[id] = Date.now();
  setTicks(getTicks().filter(uid => !uid.startsWith(id + ':')));
  if (filter === id) filter = 'all';
  save();
  renderAll();
  toast(`Removed "${book.name}"`);
}

function removeAllBooks() {
  const n = data.books.length;
  if (!n) return;
  if (!confirm(`Remove ALL ${n} book${n === 1 ? '' : 's'} and every rule? This cannot be undone.`)) return;
  if (!data.deletedBooks) data.deletedBooks = {};
  for (const b of data.books) data.deletedBooks[b.id] = Date.now(); // tombstones so the wipe syncs
  data.books = [];
  booksChanged();
  setTicks([]); // no rules left, so clear today's ticks too
  filter = 'all';
  save();
  renderAll();
  toast(`Removed all ${n} book${n === 1 ? '' : 's'}`);
}

function resetToday() {
  if (!getTicks().length) { toast('Nothing ticked today yet'); return; }
  if (!confirm("Reset all of today's ticks?")) return;
  setTicks([]);
  renderAll();
  toast("Today's ticks reset");
}

function checkDayRollover() {
  const now = todayKey();
  if (now !== currentDay) {
    currentDay = now; // ticks key changes → fresh day, old keys pruned on next tick
    _doneSet = null;
  }
}

/* ================= PDF parsing ================= */

const GAIN_RE    = /^WHAT\s+YOU\s+GAIN/i;
const LOSE_RE    = /^WHAT\s+YOU\s+LOSE/i;
const REALITY_RE = /^REALITY\s+CHECK/i;
const CHOICE_RE  = /^THE\s+CHOICE/i;
const STD_RE     = /^THE\s+STANDARD/i;
const RULE_RE    = /^RULE\s+(\d+)/i;
// lines that are only a bullet marker (+, ✗, ×, •, dash …) or page furniture
const MARKER_ONLY_RE = /^[+xX•▪●○◦‣·\-–—*✗✘×✕✖�\s]{1,3}$/;
const FURNITURE_RE   = /^(\d+|\d+\s+of\s+\d+|MASTERY\s+RULES)$/i;

async function extractPageLines(page) {
  const content = await page.getTextContent();
  // Group text items into lines by their y coordinate
  const lines = [];
  for (const item of content.items) {
    if (!item.str || !item.str.trim()) continue;
    const y = item.transform[5];
    const x = item.transform[4];
    let line = lines.find(l => Math.abs(l.y - y) < 3);
    if (!line) { line = { y, parts: [] }; lines.push(line); }
    line.parts.push({ x, str: item.str });
  }
  lines.sort((a, b) => b.y - a.y); // top of page first
  return lines.map(l =>
    l.parts.sort((a, b) => a.x - b.x).map(p => p.str).join(' ')
      .replace(/\s+/g, ' ').trim()
  ).filter(Boolean);
}

function stripBullet(line) {
  return line.replace(/^[+•▪●○◦‣·\-–—*✗✘×✕✖�]+\s*/, '').trim();
}

function parseRuleFromLines(lines) {
  let n = null, title = '';
  const gain = [], lose = [], reality = [], choice = [], stdParts = [], preParts = [];
  // pre → title (first content line) → posttitle (extra lines before sections) → gain/lose/…/std
  let section = 'pre';

  for (const raw of lines) {
    const line = raw.trim();
    if (!line || FURNITURE_RE.test(line)) continue;

    if (section === 'pre') {
      const m = line.match(RULE_RE);
      if (m) {
        n = parseInt(m[1], 10);
        const rest = line.replace(RULE_RE, '').replace(/^[\s:—–\-.]+/, '').trim();
        if (rest) { title = rest; section = 'posttitle'; } else { section = 'title'; }
      }
      continue;
    }
    if (GAIN_RE.test(line))    { section = 'gain';    continue; }
    if (LOSE_RE.test(line))    { section = 'lose';    continue; }
    if (REALITY_RE.test(line)) { section = 'reality'; continue; }
    if (CHOICE_RE.test(line))  { section = 'choice';  continue; }
    if (STD_RE.test(line))     { section = 'std';     continue; }
    if (MARKER_ONLY_RE.test(line)) continue;

    switch (section) {
      case 'title':
        // first content line becomes the title, then switch to posttitle
        title = stripBullet(line); section = 'posttitle'; break;
      case 'posttitle':
        // extra lines before any section header → subtitle / key insight
        preParts.push(stripBullet(line)); break;
      case 'gain':    gain.push(stripBullet(line)); break;
      case 'lose':    lose.push(stripBullet(line)); break;
      case 'reality': reality.push(line); break;
      case 'choice':  choice.push(line); break;
      case 'std':     stdParts.push(line); break;
    }
  }

  if (n === null || !title) return null;
  // prefer an explicit THE STANDARD section; fall back to the subtitle lines
  const standard = stdParts.length ? stdParts.join(' ').trim() : preParts.join(' ').trim();
  return {
    n, title, gain, lose,
    reality: reality.join(' ').trim(),
    choice: choice.join(' ').trim(),
    standard
  };
}

function titleCase(s) {
  return s.toLowerCase().replace(/\b[a-z]/g, c => c.toUpperCase());
}

function bookNameFromFile(filename, coverLines) {
  // The filename is the most reliable, most distinct source — prefer it.
  // (Cover titles are often split across lines, e.g. "BRUTAL" / "DISCIPLINE"
  //  / "RULES", which previously collapsed many books to just "Brutal".)
  const fromFile = filename.replace(/\.pdf$/i, '')
    .replace(/[_\-]+/g, ' ').replace(/\s+/g, ' ').trim();
  const generic = !fromFile || fromFile.length < 3 ||
    /^(document|untitled|file|download|scan|image|new|temp|pdf)\b/i.test(fromFile) ||
    /^\d+$/.test(fromFile);
  if (!generic) {
    return fromFile === fromFile.toUpperCase() ? titleCase(fromFile) : fromFile;
  }

  // Generic filename → fall back to the cover, joining its consecutive title
  // lines (so a multi-line cover title becomes one name).
  if (coverLines && coverLines.length) {
    const titleLines = [];
    for (const l of coverLines) {
      const t = l.trim();
      if (!t || /^(MASTERY|RULES)$/i.test(t)) continue;
      if (FURNITURE_RE.test(t) || RULE_RE.test(t)) { if (titleLines.length) break; else continue; }
      titleLines.push(t);
      if (titleLines.length >= 4) break;
    }
    const joined = titleLines.join(' ').replace(/\s+/g, ' ').trim();
    if (joined && joined.length <= 60) {
      return joined === joined.toUpperCase() ? titleCase(joined) : joined;
    }
  }
  return fromFile || 'Untitled Book';
}

// Split all PDF lines into per-rule chunks by RULE N markers, parse each chunk
function parseAllRules(allLines) {
  const chunks = [];
  for (const raw of allLines) {
    const line = raw.trim();
    if (!line || FURNITURE_RE.test(line)) continue;
    if (RULE_RE.test(line)) {
      chunks.push([raw]);          // start a new chunk
    } else if (chunks.length) {
      chunks[chunks.length - 1].push(raw); // append to current chunk
    }
    // lines before the first RULE are skipped (cover / intro)
  }
  return chunks.map(c => parseRuleFromLines(c)).filter(Boolean);
}

async function importPdf(file) {
  let pdf;
  try {
    const buf = await file.arrayBuffer();
    pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  } catch (e) {
    console.error('PDF load error:', e);
    const reason = (e && e.message && e.message.includes('password'))
      ? 'the file is password-protected'
      : 'the file may be corrupted or unsupported';
    toast(`Can't open "${file.name}" — ${reason}`);
    return { status: 'error' };
  }

  // Collect all text lines from every page, then split by RULE markers.
  // This handles PDFs with multiple rules per page AND rules that span pages.
  const allLines = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    try {
      const page = await pdf.getPage(p);
      allLines.push(...(await extractPageLines(page)));
    } catch (e) {
      console.warn(`Skipped page ${p} of ${file.name}:`, e);
    }
  }

  // Lines before the first RULE marker = potential cover / intro
  let firstRuleIdx = allLines.findIndex(l => RULE_RE.test(l.trim()));
  const coverLines = firstRuleIdx > 0 ? allLines.slice(0, firstRuleIdx) : null;

  const rules = parseAllRules(allLines);

  if (!rules.length) {
    toast(`No rules found in "${file.name}" — the PDF must contain "RULE N" headings`);
    return { status: 'empty' };
  }

  // exact match → already fully imported, skip silently
  const exact = data.books.find(b => contentSignature(b.rules) === contentSignature(rules));
  if (exact) return { status: 'uptodate', name: exact.name };

  // Same-book detection by CONTENT, not just numbers. Two PDFs are the same
  // book only if the rules they share by NUMBER also have matching TITLES.
  // (Every "50 rules" PDF is numbered 1–50, so number overlap alone would
  //  wrongly merge two completely different books.)
  const norm = t => (t || '').toLowerCase().replace(/\s+/g, ' ').trim();
  let bestMatch = null, bestRate = 0;
  for (const b of data.books) {
    const titleByNum = new Map((b.rules || []).map(r => [r.n, norm(r.title)]));
    let shared = 0, sameTitle = 0;
    for (const r of rules) {
      if (titleByNum.has(r.n)) { shared++; if (titleByNum.get(r.n) === norm(r.title)) sameTitle++; }
    }
    const rate = shared ? sameTitle / shared : 0;       // title agreement among shared numbers
    if (shared && rate >= 0.6 && rate > bestRate) { bestRate = rate; bestMatch = b; }
  }

  if (bestMatch) {
    const existingNums = new Set(bestMatch.rules.map(r => r.n));
    const newRules = rules.filter(r => !existingNums.has(r.n));
    if (!newRules.length) return { status: 'uptodate', name: bestMatch.name };
    bestMatch.rules = [...bestMatch.rules, ...newRules].sort((a, b) => a.n - b.n);
    booksChanged();
    save();
    return { status: 'merged', count: newRules.length, name: bestMatch.name };
  }

  // brand-new book
  data.books.push({
    id: uuid(),
    name: bookNameFromFile(file.name, coverLines),
    color: bookColor(data.books.length),
    importedAt: todayKey(),
    rules
  });
  booksChanged();
  save();
  return { status: 'added', count: rules.length };
}

// fingerprint of a book's contents (rule count + each rule's number and title)
function contentSignature(rules) {
  return rules.length + '#' + rules.map(r =>
    r.n + ':' + (r.title || '').toLowerCase().replace(/\s+/g, ' ').trim()).join('|');
}

async function importFiles(fileList) {
  const files = [...fileList].filter(f =>
    f.type === 'application/pdf' || /\.pdf$/i.test(f.name));
  if (!files.length) { toast('Drop a PDF file'); return; }

  let added = 0, addedBooks = 0, merged = 0, mergedBooks = 0, uptodate = 0;
  for (const f of files) {
    try {
      const res = await importPdf(f);
      if (res.status === 'added')    { added += res.count; addedBooks++; }
      else if (res.status === 'merged')   { merged += res.count; mergedBooks++; }
      else if (res.status === 'uptodate') uptodate++;
    } catch (e) {
      console.error(e);
      toast(`Couldn't read "${f.name}"`);
    }
  }
  const changed = addedBooks + mergedBooks;
  if (changed) {
    renderAll();
    const parts = [];
    if (addedBooks) parts.push(`Imported ${added} rule${added === 1 ? '' : 's'} from ${addedBooks} new book${addedBooks === 1 ? '' : 's'}`);
    if (mergedBooks) parts.push(`Added ${merged} new rule${merged === 1 ? '' : 's'} to ${mergedBooks} book${mergedBooks === 1 ? '' : 's'}`);
    if (uptodate) parts.push(`${uptodate} already up to date`);
    toast(parts.join(' · '));
  } else if (uptodate) {
    toast('Already up to date — nothing new to add');
  }
}

// Cloud doc layout:
//   bx — compressed {books, deletedBooks}; only re-uploaded when books change
//   tk — small plain JSON of tick days + stamps; uploaded on every change
// Recompressing the whole ~MB library on every tick froze the phone for
// seconds; a tick now costs a few KB.
let _lastBx = null, _lastTk = null; // last payloads we sent/saw → confirmed echoes become no-ops

function tickPayload() {
  const t = { tickStamp: data.tickStamp || {} };
  for (const k of Object.keys(data)) if (k.startsWith('ticks_')) t[k] = data[k];
  return JSON.stringify(t);
}

async function pushRemote() {         // full push: books + ticks
  if (!fbUser) return;
  const bx = LZString.compressToBase64(JSON.stringify({ books: data.books, deletedBooks: data.deletedBooks || {} }));
  const tk = tickPayload();
  await fbDb.collection('users').doc(fbUser.uid)
    .set({ bx, tk, updatedAt: data.updatedAt || Date.now() });
  _lastBx = bx; _lastTk = tk;
  cloudBooksDirty = false;
}

async function pushTicks() {          // ticks-only merge write (a few KB)
  if (!fbUser) return;
  const tk = tickPayload();
  await fbDb.collection('users').doc(fbUser.uid)
    .set({ tk, updatedAt: data.updatedAt || Date.now() }, { merge: true });
  _lastTk = tk;
}

// does the cloud copy lack a tick we have locally? (order-independent — avoids sync ping-pong)
function remoteMissingOurTicks(remote) {
  for (const k of Object.keys(data)) {
    if (!k.startsWith('ticks_')) continue;
    const rem = new Set(remote[k] || []);
    for (const u of data[k] || []) if (!rem.has(u)) return true;
  }
  return false;
}

function onRemoteSnapshot(snap) {
  // local echo of our own write (not yet committed) — nothing new to process
  if (snap.metadata && snap.metadata.hasPendingWrites) return;

  const d = snap.data();
  if (!d || (!d.bx && !d.cz && !d.json)) {  // first sign-in on this account → seed cloud with local data
    pushRemote()
      .then(() => { syncStatus = { state: 'ok', lastSync: new Date(), error: null }; renderSyncUI(); })
      .catch(onRemoteError);
    return;
  }

  // server-confirmed echo of exactly what we sent → skip the heavy merge entirely
  if (d.bx && d.bx === _lastBx && d.tk === _lastTk) {
    syncStatus = { state: 'ok', lastSync: new Date(), error: null };
    renderSyncUI();
    return;
  }

  let remote;
  try {
    if (d.bx) {
      remote = JSON.parse(LZString.decompressFromBase64(d.bx));       // {books, deletedBooks}
      if (d.tk) Object.assign(remote, JSON.parse(d.tk));              // ticks_* + tickStamp
      remote.updatedAt = d.updatedAt || 0;
    } else {
      const json = d.cz ? LZString.decompressFromBase64(d.cz) : d.json; // legacy whole-state formats
      remote = JSON.parse(json);
    }
  } catch (e) { return; }
  if (!remote || !Array.isArray(remote.books)) return;
  _lastBx = d.bx || null; _lastTk = d.tk || null;

  const before = JSON.stringify(data);
  mergeRemote(remote);
  if (JSON.stringify(data) !== before) renderAll();
  // push back only what the cloud is actually missing
  if (remoteBooksBehind(remote)) pushRemote().catch(onRemoteError);
  else if (remoteMissingOurTicks(remote)) pushTicks().catch(onRemoteError);

  syncStatus = { state: 'ok', lastSync: new Date(), error: null };
  renderSyncUI();
}

function onRemoteError(err) {
  syncStatus = { state: 'error', lastSync: syncStatus.lastSync, error: (err && err.message) || 'Sync error' };
  renderSyncUI();
}

// Merge remote into local without ever losing a book:
//  - books are unioned by id (a book added on either device survives)
//  - deletions propagate via tombstones (deletedBooks: {id: ts}), so an
//    intentional Remove still syncs and a deleted book never resurrects
//  - ticks are resolved per day by their own timestamp (unioned on a tie)
function mergeRemote(remote) {
  if (!remote) return;

  // book deletions — union of tombstones, newest timestamp wins
  const tomb = { ...(data.deletedBooks || {}) };
  for (const [id, ts] of Object.entries(remote.deletedBooks || {})) {
    tomb[id] = Math.max(tomb[id] || 0, ts);
  }

  // union books by id (local copy wins on conflict), dropping any tombstoned book
  const byId = new Map();
  for (const b of (remote.books || [])) byId.set(b.id, b);
  for (const b of (data.books || [])) byId.set(b.id, b);
  const books = [...byId.values()].filter(b => !tomb[b.id]);

  // ticks per day
  const ls = data.tickStamp || {}, rs = remote.tickStamp || {};
  const stamps = {}, ticks = {};
  const keys = [...new Set([...Object.keys(data), ...Object.keys(remote)])].filter(k => k.startsWith('ticks_'));
  for (const k of keys) {
    const day = k.slice('ticks_'.length);
    const lt = ls[day] || 0, rt = rs[day] || 0;
    if (lt === rt) ticks[k] = [...new Set([...(data[k] || []), ...(remote[k] || [])])];
    else ticks[k] = (lt > rt ? data[k] : remote[k]) || [];
    stamps[day] = Math.max(lt, rt);
  }

  data = { ...data, ...ticks, books, deletedBooks: tomb, tickStamp: stamps,
           updatedAt: Math.max(data.updatedAt || 0, remote.updatedAt || 0) };
  invalidateRules();
  _doneSet = null;
  writeLocal(data); // compressed direct write: no save() to avoid re-scheduling sync
}

// is the cloud copy missing any book or deletion we hold locally?
function remoteBooksBehind(remote) {
  const rb = new Set((remote.books || []).map(b => b.id));
  for (const b of (data.books || [])) if (!rb.has(b.id)) return true;
  const rt = remote.deletedBooks || {};
  for (const id of Object.keys(data.deletedBooks || {})) if (!(id in rt)) return true;
  return false;
}

// called by save() after every local change; ticks-only unless books changed
function scheduleSync() {
  if (!fbUser) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(() => {
    (cloudBooksDirty ? pushRemote() : pushTicks()).catch(onRemoteError);
  }, 1200);
}

async function signIn() {
  if (!fbReady() || !fbAuth) { toast('Sync is still loading — try again in a moment'); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await fbAuth.signInWithPopup(provider);
  } catch (e) {
    const code = e && e.code;
    if (code === 'auth/popup-blocked' || code === 'auth/operation-not-supported-in-this-environment'
        || code === 'auth/cancelled-popup-request') {
      try { await fbAuth.signInWithRedirect(provider); } catch (e2) { toast('Sign-in failed: ' + e2.message); }
    } else if (code !== 'auth/popup-closed-by-user') {
      toast('Sign-in failed: ' + (e.message || code));
    }
  }
}

async function signOutSync() {
  try { await fbAuth.signOut(); toast('Signed out on this device'); } catch (e) { /* ignore */ }
}

function renderSyncUI() {
  const box = $('sync-box');
  if (!box) return;
  if (!fbReady()) {
    box.innerHTML = `<p class="sync-note">Sync needs an internet connection. If this persists, reload the page.</p>`;
    return;
  }
  if (!fbUser) {
    box.innerHTML = `
      <p class="sync-note">Sign in with Google to keep your library and daily ticks the same on every device.
        Your data stays private to your own account and syncs automatically.</p>
      <div class="sync-row">
        <button id="btn-google" class="gbtn"><span class="gmark">G</span>&nbsp;Sign in with Google</button>
      </div>`;
    $('btn-google').onclick = signIn;
  } else {
    const when = syncStatus.lastSync
      ? syncStatus.lastSync.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '—';
    const who = esc(fbUser.email || fbUser.displayName || 'your account');
    const line = syncStatus.state === 'syncing' ? '⏳ Connecting…'
      : syncStatus.state === 'error' ? `<span class="sync-err">⚠ ${esc(syncStatus.error)}</span>`
      : `✓ Synced as ${who} · ${when}`;
    box.innerHTML = `
      <p class="sync-note">${line}</p>
      <div class="sync-row">
        <button id="btn-signout" class="danger">Sign out</button>
      </div>`;
    $('btn-signout').onclick = signOutSync;
  }
}

/* ================= Toast ================= */

let toastTimer = null;
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ================= Wiring ================= */

let searchTimer = null;
$('search').addEventListener('input', (e) => {
  clearTimeout(searchTimer);   // debounce: render once you pause typing, not per keystroke
  searchTimer = setTimeout(() => { searchTerm = e.target.value; renderGrid(); }, 180);
});
$('btn-random').onclick = randomRule;
$('btn-mix').onclick = mixCards;
$('btn-order').onclick = orderCards;
updateMixButtons();
$('btn-reset').onclick = resetToday;
$('btn-import').onclick = () => $('file-input').click();
$('btn-modal-import').onclick = () => $('file-input').click();
$('btn-remove-all').onclick = removeAllBooks;
$('file-input').addEventListener('change', (e) => {
  importFiles(e.target.files);
  e.target.value = '';
});

$('btn-library').onclick = () => $('library-modal').classList.add('show');
$('btn-modal-close').onclick = () => $('library-modal').classList.remove('show');
$('library-modal').addEventListener('click', (e) => {
  if (e.target === $('library-modal')) $('library-modal').classList.remove('show');
});

$('rename-save').onclick = commitRename;
$('rename-cancel').onclick = cancelRename;
$('rename-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); commitRename(); }
  if (e.key === 'Escape') cancelRename();
});
$('rename-modal').addEventListener('click', (e) => {
  if (e.target === $('rename-modal')) cancelRename();
});

// Drag & drop anywhere on the page
let dragDepth = 0;
document.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragDepth++;
  document.body.classList.add('dragging');
});
document.addEventListener('dragleave', () => {
  dragDepth = Math.max(0, dragDepth - 1);
  if (!dragDepth) document.body.classList.remove('dragging');
});
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
  e.preventDefault();
  dragDepth = 0;
  document.body.classList.remove('dragging');
  if (e.dataTransfer && e.dataTransfer.files.length) importFiles(e.dataTransfer.files);
});

// Make sure any pending (debounced) save is written before the app closes/backgrounds.
window.addEventListener('pagehide', flushSave);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') flushSave();
});

// Tick the countdown every minute; full re-render at day rollover
setInterval(() => {
  if (todayKey() !== currentDay) renderAll();
  else renderCountdown();
}, 60 * 1000);

$('ver-mark').textContent = APP_VERSION.split(' ')[0]; // small always-visible build mark, e.g. "v11"
$('ver-mark').title = APP_VERSION;

renderAll();
initFirebase();

// Service worker: keeps the installed (home-screen) app updating to the latest
// build when online, instead of being stuck on a cached old version.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            toast('Updated — close and reopen the app to finish');
          }
        });
      });
    }).catch(() => { /* ignore */ });
  });
}
</script>
